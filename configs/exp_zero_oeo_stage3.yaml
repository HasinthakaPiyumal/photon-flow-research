# exp_zero_oeo_stage3.yaml
# PhotonFlow Stage-3 toward fully photonic (zero-OEO) inference graph.
#
# Stage 3 of the 4-stage plan in plans/abundant-juggling-gosling.md:
# Architectural surgery for mismatches with NO published photonic primitive.
#   * conditioning_mode=additive   -- drop 29 adaLN per-dim scale/shift/gate
#                                     ops (M4).  Single photonic bias proj
#                                     replaces the 6-chunk adaLN-Zero.
#   * residual_mode=ungated        -- drop 28 per-channel gate multiplies (M6).
#                                     Residual stream becomes coherent optical
#                                     addition via tunable directional coupler
#                                     (Nature Photonics 2024).
#   * norm_affine=false            -- drop 29 DivisivePowerNorm learnable
#                                     gain+bias ops (M3).
#   * final_adaln_enabled=false    -- drop the final-layer adaLN conditioning.
#
# Color: RED.  No published on-chip primitive maps these ops directly;
# the architectural choice is to DELETE them rather than approximate.
#
# Predicted gap vs baseline: 0.11 - 0.15 (per the plan -- dominant honesty bill).
# Stage 1 was -0.0119 and Stage 2 is expected to be ~0.08, so Stage 3 is the
# first stage with a genuine accuracy regression.
#
# Run via kaggle/photonflow-zero-oeo-stage3/ kernel.

experiment:
  name: exp_zero_oeo_stage3
  description: "PhotonFlow Stage-3: +additive conditioning + ungated residual + no-affine DPN (RED)"

model:
  type: photonflow
  # --- v17 architecture backbone, UNCHANGED ---
  in_dim: 784
  hidden_dim: 784
  num_blocks: 14
  time_dim: 256
  gate_init: 0.5                 # not used when conditioning_mode=additive
  adaln_init_std: 0.02           # reused as cond_bias_proj init_scale
  adaln_bottleneck: 8            # not used when conditioning_mode=additive
  num_monarch_factors: 1
  monarch_init: random
  depth_decay_residual: false
  absorber_alpha: 0.8
  absorber_leaky_slope: 0.05
  learnable_absorber_alpha: false
  mean_center_norm: false

  # --- Stage-0 mitigations (M2/M5/M8a/M9/M12) ---
  use_noise: true
  sigma_s: 0.001
  sigma_t: 0.005
  shot_signal_dependent: true
  absorber_intensity_mode: differential
  cumulative_loss_db_per_stage: 0.0003
  monarch_bias: false

  # --- Stage-1 GREEN kwargs (M1/M7/M8b) ---
  unitary_project: true
  proj_style: monarch
  phase_noise_sigma: 0.005

  # --- Stage-2 YELLOW kwargs (PPLN + Monarch MLPs + wavelength time) ---
  time_encoding: wavelength
  time_mlp_style: monarch
  adaln_proj_style: monarch      # not constructed when conditioning_mode=additive
  final_adaln_style: monarch     # not constructed when final_adaln_enabled=false

  # --- Stage-3 RED kwargs (architectural surgery; no published primitive) ---
  conditioning_mode: additive    # M4: drop 29 per-dim scale/shift ops
  residual_mode: ungated         # M6: drop 28 per-channel gate multiplies
  norm_affine: false             # M3: drop 29 DivisivePowerNorm learnable affine
  final_adaln_enabled: false     # drop final_adaLN entirely (consistent w/ Stage-3)

data:
  dataset: mnist
  batch_size: 128
  root: ./data
  num_workers: 2

training:
  lr: 1.7e-3
  total_steps: 2000
  warmup_steps: 600
  lr_schedule: cosine
  grad_clip: 1.0
  checkpoint_every: 1000
  sample_every: 500
  sample_steps: 20
  seed: 42
  time_sampling: uniform
  direction_loss_weight: 0.0
  loss_weight_gamma: 0.0

ema:
  enabled: false
  decay: 0.9999

qat:
  enabled: false

output_dir: outputs/exp_zero_oeo_stage3
