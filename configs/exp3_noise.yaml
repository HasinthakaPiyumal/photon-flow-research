# exp3_noise.yaml
# PhotonFlow + shot noise + thermal crosstalk on MNIST
# Purpose: Noise robustness — "does noise-aware training help?"
#
# Injects photonic noise (shot + thermal crosstalk) after each
# Monarch layer during training. This bridges the simulation-to-
# hardware gap: the model learns weight configurations that are
# robust to the noise it will encounter on a real photonic chip.
#
# Shot noise:      sigma_s = 0.02 (quantum noise on photon counts)
# Thermal crosstalk: sigma_t = 0.01 (heat coupling between phase shifters)
#
# Run via: notebooks/04_exp3_noise_regularized.ipynb

experiment:
  name: exp3_noise_regularized
  description: "PhotonFlow + photonic noise injection (shot + thermal crosstalk)"

model:
  type: photonflow
  in_dim: 784          # MNIST: 28x28x1 = 784
  hidden_dim: 256      # 16^2 (perfect square for MonarchLayer)
  num_blocks: 6        # 6 PhotonFlowBlocks
  use_noise: true      # ENABLED — inject noise after each Monarch layer
  sigma_s: 0.02        # Shot noise std (CLAUDE.md spec)
  sigma_t: 0.01        # Thermal crosstalk std (CLAUDE.md spec)

data:
  dataset: mnist
  batch_size: 128
  root: ./data
  num_workers: 2

training:
  lr: 1.0e-4           # Adam learning rate
  total_steps: 100000  # 100K steps
  checkpoint_every: 5000
  sample_every: 5000
  sample_steps: 20     # Euler ODE steps for generation
  seed: 42

qat:
  enabled: false       # No QAT yet — that's exp4

output_dir: outputs/exp3_noise_regularized
