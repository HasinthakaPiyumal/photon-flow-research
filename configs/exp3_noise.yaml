# exp3_noise.yaml
# PhotonFlow + shot noise + thermal crosstalk on MNIST
# Purpose: Noise robustness — "does noise-aware training help?"
#
# Training improvements (same as exp2):
#   - Logit-normal timestep sampling (Esser et al. 2024)
#   - EMA (Karras et al. 2024)
#   - Cosine LR with warmup
#
# Run via: notebooks/04_exp3_noise_regularized.ipynb

experiment:
  name: exp3_noise_regularized
  description: "PhotonFlow + noise + logit-normal + EMA (MNIST)"

model:
  type: photonflow
  in_dim: 784
  hidden_dim: 784
  num_blocks: 8
  use_noise: true
  sigma_s: 0.005             # 5x above Shen 2017 hardware measurement (0.001)
  sigma_t: 0.003             # Proportionally scaled thermal crosstalk
  shot_signal_dependent: true  # Shen 2017 physically-accurate model: noise_i ~ N(0, (sigma_s*|x_i|)^2)
                                # Noise scales WITH signal → prevents accumulation blow-up
                                # and matches real photonic hardware (Poisson photon statistics)
  noise_warmup_steps: 30000   # Extended warmup: 15% of 200K (was 10K=5%)
                              # Lets model fully learn signal before noise challenges it
                              # (research: "large noise early, decay" works best — Zhou et al. 2019)
  noise_warmup_schedule: cosine  # cosine ramp (smoother than linear at boundary)
  noise_augment_k: 2             # Average gradient over K noise realizations per step
  gate_init: 0.1
  # MUST match exp2's ACTUAL values (not its config — exp2 notebook ignores these)
  # Controlled experiment: noise is the ONLY variable
  depth_decay_residual: false   # exp2 default (notebook doesn't read config)
  adaln_init_std: 0.0           # exp2 default (pure adaLN-Zero)
  num_monarch_factors: 1        # exp2 default (single Monarch factor)

data:
  dataset: mnist
  batch_size: 128
  root: ./data
  num_workers: 2

training:
  lr: 3.0e-4           # Match exp2 LR — isolate noise as only variable
  total_steps: 200000
  checkpoint_every: 5000
  sample_every: 5000
  sample_steps: 20
  seed: 42
  time_sampling: uniform
  logit_normal_mean: 0.0
  logit_normal_std: 1.0
  curriculum_transition_frac: 0.6
  grad_clip: 1.0              # Max gradient norm (stabilizes noisy training)
  direction_loss_weight: 0.0
  loss_weight_gamma: 0.0
  lr_schedule: cosine
  warmup_steps: 2000

ema:
  enabled: true
  decay: 0.9999

qat:
  enabled: false

output_dir: outputs/exp3_noise_regularized
