# exp3_noise.yaml
# PhotonFlow + shot noise + thermal crosstalk on MNIST
# Purpose: Noise robustness — "does noise-aware training help?"
#
# Training improvements (same as exp2):
#   - Logit-normal timestep sampling (Esser et al. 2024)
#   - EMA (Karras et al. 2024)
#   - Cosine LR with warmup
#
# Run via: notebooks/04_exp3_noise_regularized.ipynb

experiment:
  name: exp3_noise_regularized
  description: "PhotonFlow + noise + logit-normal + EMA (MNIST)"

model:
  type: photonflow
  in_dim: 784
  hidden_dim: 1024     # 32^2 — 1.3x expansion, more Monarch capacity
  num_blocks: 8
  use_noise: true
  sigma_s: 0.02
  sigma_t: 0.01
  gate_init: 0.1
  depth_decay_residual: true
  adaln_init_std: 0.02
  num_monarch_factors: 2

data:
  dataset: mnist
  batch_size: 128
  root: ./data
  num_workers: 2

training:
  lr: 1.0e-4
  total_steps: 200000
  checkpoint_every: 5000
  sample_every: 5000
  sample_steps: 20
  seed: 42
  time_sampling: curriculum
  logit_normal_mean: 0.0
  logit_normal_std: 1.0
  curriculum_transition_frac: 0.6
  direction_loss_weight: 0.5
  loss_weight_gamma: 5.0
  lr_schedule: cosine
  warmup_steps: 2000

ema:
  enabled: true
  decay: 0.9999

qat:
  enabled: false

output_dir: outputs/exp3_noise_regularized
