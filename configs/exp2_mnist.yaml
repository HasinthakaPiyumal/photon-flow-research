# exp2_mnist.yaml
# PhotonFlow (Monarch layers) on MNIST — no noise injection
# Purpose: Sanity check — "do Monarch layers work for generation?"
#
# Run via: notebooks/03_exp2_photonflow_mnist.ipynb

experiment:
  name: exp2_photonflow_mnist
  description: "PhotonFlow with Monarch layers, no noise (MNIST sanity check)"

model:
  type: photonflow
  in_dim: 784          # MNIST: 28x28x1 = 784
  hidden_dim: 784      # 28^2 — no bottleneck, matches input dim
  num_blocks: 8        # Paper spec: 6-8 blocks, more depth for expressivity
  use_noise: false
  sigma_s: 0.0
  sigma_t: 0.0

data:
  dataset: mnist
  batch_size: 128
  root: ./data
  num_workers: 2

training:
  lr: 1.0e-4
  total_steps: 200000
  checkpoint_every: 5000
  sample_every: 5000
  sample_steps: 20
  seed: 42

qat:
  enabled: false

output_dir: outputs/exp2_photonflow_mnist
