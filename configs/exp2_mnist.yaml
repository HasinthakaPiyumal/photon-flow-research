# exp2_mnist.yaml
# PhotonFlow (Monarch layers) on MNIST — no noise injection
# Purpose: Sanity check — "do Monarch layers work for generation?"
#
# Architecture redesign: hidden_dim=256 (same as baseline) with 8 blocks.
# This fixes the adaLN parameter bloat (was 84% of block params at dim=784,
# now balanced). Input/output projections Linear(784<->256) handle the
# dimension change (electronic boundary, same as baseline's patch projection).
#
# Run via: notebooks/03_exp2_photonflow_mnist.ipynb

experiment:
  name: exp2_photonflow_mnist
  description: "PhotonFlow with Monarch layers, hidden_dim=256 (MNIST)"

model:
  type: photonflow
  in_dim: 784          # MNIST: 28x28x1 = 784
  hidden_dim: 256      # 16^2 — same as baseline, balanced adaLN params
  num_blocks: 8        # More blocks to compensate for smaller per-block capacity
  use_noise: false     # No photonic noise in this experiment
  sigma_s: 0.0
  sigma_t: 0.0

data:
  dataset: mnist
  batch_size: 128
  root: ./data
  num_workers: 2

training:
  lr: 1.0e-4           # Proven LR (DiT uses 1e-4)
  total_steps: 200000  # 200K steps (match baseline for fair comparison)
  checkpoint_every: 5000
  sample_every: 5000
  sample_steps: 20     # Euler ODE steps for generation
  seed: 42

qat:
  enabled: false

output_dir: outputs/exp2_photonflow_mnist
