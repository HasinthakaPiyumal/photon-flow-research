# exp2_mnist.yaml
# PhotonFlow (Monarch layers) on MNIST — no noise injection
# Purpose: Sanity check — "do Monarch layers work for generation?"
#
# Training improvements applied:
#   - Logit-normal timestep sampling (Esser et al. ICML 2024, SD3 paper)
#     Biases training toward intermediate timesteps where velocity prediction
#     is hardest. rf/lognorm(0.00, 1.00) outperforms uniform sampling.
#   - EMA of model weights (Karras et al. CVPR 2024)
#     EMA weights produce better generation quality than raw training weights.
#   - Cosine LR schedule with warmup (standard practice)
#     Prevents early divergence and provides smooth annealing.
#
# Run via: notebooks/03_exp2_photonflow_mnist.ipynb

experiment:
  name: exp2_photonflow_mnist
  description: "PhotonFlow with Monarch layers, logit-normal sampling, EMA (MNIST)"

model:
  type: photonflow
  in_dim: 784          # MNIST: 28x28x1 = 784
  hidden_dim: 784      # 28^2 — no bottleneck, matches input dim
  num_blocks: 8        # Paper spec: 6-8 blocks, more depth for expressivity
  use_noise: false
  sigma_s: 0.0
  sigma_t: 0.0
  # Gate init > 0: blocks contribute from step 0 (not gated to zero)
  gate_init: 0.1
  # Depth-decayed residuals (Wang et al. ICLR 2025)
  depth_decay_residual: true
  # adaLN Gaussian init ("Unveiling AdaLN-Zero," OpenReview 2024)
  adaln_init_std: 0.02

data:
  dataset: mnist
  batch_size: 128
  root: ./data
  num_workers: 2

training:
  lr: 3.0e-4           # Higher LR for Monarch layers (ButterflyFlow uses 1e-3)
  total_steps: 200000
  checkpoint_every: 5000
  sample_every: 5000
  sample_steps: 20
  seed: 42
  # Curriculum timestep sampling (arXiv 2603.12517, 2026)
  # Phase 1: logit-normal (structure), Phase 2: uniform (boundaries)
  time_sampling: curriculum
  logit_normal_mean: 0.0
  logit_normal_std: 1.0
  curriculum_transition_frac: 0.6
  # Velocity direction loss (FasterDiT, Yao et al. NeurIPS 2024)
  direction_loss_weight: 0.5
  # Time-dependent loss weighting (arXiv 2511.16599, 2025)
  loss_weight_gamma: 5.0
  # Cosine LR with warmup
  lr_schedule: cosine
  warmup_steps: 2000

ema:
  enabled: true
  decay: 0.9999

qat:
  enabled: false

output_dir: outputs/exp2_photonflow_mnist
